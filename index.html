<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCOS Quiz</title>
</head>
<body>
    <h1>PCOS Quiz</h1>
    <form>
        <label for="q1">1. What does PCOS stand for?</label><br>
        <input type="radio" name="q1" value="a"> A) Polycystic Ovary Syndrome<br>
        <input type="radio" name="q1" value="b"> B) Polygenic Ovarian Syndrome<br>
        <input type="radio" name="q1" value="c"> C) Primary Cystic Ovary Syndrome<br>
        <input type="radio" name="q1" value="d"> D) Polycystic Oocyte Syndrome<br><br>
        <label for="q2">2. Which of the following is a symptom of PCOS?</label><br>
        <input type="radio" name="q2" value="a"> A) Irregular periods<br>
        <input type="radio" name="q2" value="b"> B) Hair loss<br>
        <input type="radio" name="q2" value="c"> C) Weight gain<br>
        <input type="radio" name="q2" value="d"> D) All of the above<br><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
